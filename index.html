<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Schafkopf Tracker</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:#0b160b;overscroll-behavior:none}
    #root{min-height:100vh}
    #loading{display:flex;align-items:center;justify-content:center;height:100vh;
      font-family:monospace;color:#4a7a4a;font-size:13px;letter-spacing:2px}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#0b160b}
    ::-webkit-scrollbar-thumb{background:#2a4a2a;border-radius:2px}
  </style>
</head>
<body>
  <div id="loading">SCHAFKOPF LÄDT …</div>
  <div id="root" style="display:none"></div>

  <!-- React + ReactDOM + Recharts -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js" crossorigin></script>

  <script>
    // Zeige Root sobald Babel+React bereit
    window.addEventListener('load', function() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('root').style.display = 'block';
    });
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect } = React;
    const {
      LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip,
      ReferenceLine, ResponsiveContainer, BarChart, Bar
    } = Recharts;

    const LS_KEY  = "schafkopf-v1";
    const PCOLORS = ["#e85d4a","#f5c842","#4ab8e8","#7de87a"];

    const TYPE_CATS = {
      "2vs2":   {label:"2 vs 2", color:"#4ab8e8"},
      "solo":   {label:"Solo",   color:"#f5c842"},
      "ramsch": {label:"Ramsch", color:"#e85d4a"},
    };

    const GAME_TYPES = [
      {id:"sauspiel", label:"Sauspiel",  cat:"2vs2",   hasFarbe:false,isSolo:false, desc:"Rufspiel – Spieler + Sau-Partner"},
      {id:"hochzeit", label:"Hochzeit",  cat:"2vs2",   hasFarbe:false,isSolo:false, desc:"Partner via ersten Stich"},
      {id:"wenz",     label:"Wenz",      cat:"solo",   hasFarbe:true, isSolo:true,  desc:"Nur Unter als Trumpf"},
      {id:"geier",    label:"Geier",     cat:"solo",   hasFarbe:true, isSolo:true,  desc:"Nur Ober als Trumpf"},
      {id:"farbsolo", label:"Farbsolo",  cat:"solo",   hasFarbe:false,isSolo:true,  desc:"Farbe + Ober/Unter Trumpf"},
      {id:"ramsch",   label:"Ramsch",    cat:"ramsch", hasFarbe:false,isSolo:false, desc:"Meiste Augen verliert"},
    ];

    // ── Berechnung ──────────────────────────────────────────────────
    function calcBetrag(form, typeCfg, tariff) {
      const base = typeCfg.cat === "2vs2" ? tariff.sauspiel : tariff.solo;
      const mods = (form.schneider?1:0)+(form.schwarz?1:0)+(form.laufende>=3?form.laufende-2:0);
      let b = base + mods * tariff.sl;
      if (form.tout) b *= 2;
      return b;
    }

    function calcDeltas(form, players, betrag, typeCfg) {
      const d = Object.fromEntries(players.map(p=>[p,0]));
      const sm = Math.pow(2, form.sticht||0);
      const B = betrag * sm;
      if (typeCfg.cat === "2vs2") {
        if (!form.spieler || !form.partner) return null;
        const w = form.gewonnen ? [form.spieler,form.partner] : players.filter(p=>p!==form.spieler&&p!==form.partner);
        const l = players.filter(p=>!w.includes(p));
        w.forEach(p=>d[p]=+B); l.forEach(p=>d[p]=-B);
      } else if (typeCfg.cat === "solo") {
        if (!form.solist) return null;
        const sg = form.gewonnen ? 1 : -1;
        d[form.solist] = sg*3*B;
        players.forEach(p=>{ if(p!==form.solist) d[p]=-sg*B; });
      } else if (typeCfg.cat === "ramsch") {
        if (!form.verlierer) return null;
        const jm = Math.pow(2, form.jungfrauen||0);
        const RB = B*jm;
        if (form.durchmarsch) { d[form.verlierer]=+3*RB; players.forEach(p=>{if(p!==form.verlierer)d[p]=-RB;}); }
        else                  { d[form.verlierer]=-3*RB; players.forEach(p=>{if(p!==form.verlierer)d[p]=+RB;}); }
      }
      return d;
    }

    // ── Styles ──────────────────────────────────────────────────────
    const C = {bg1:"#0c180c",bg2:"#111f11",border:"#1a321a",text:"#c8e0c8",dim:"#4a7a4a",mute:"#2a4a2a"};
    const s = {
      page:   {background:"linear-gradient(160deg,#0b160b,#101e10)",minHeight:"100vh",fontFamily:"'Courier New',monospace",color:C.text,paddingBottom:64},
      topbar: {background:"#080f08",borderBottom:`1px solid ${C.border}`,padding:"10px 16px",position:"sticky",top:0,zIndex:10},
      card:   (bc=C.border,bg=C.bg1)=>({background:bg,border:`1px solid ${bc}`,borderRadius:10,padding:"12px 14px",marginBottom:10}),
      sec:    {fontSize:9,color:"#4a7a4a",letterSpacing:2,textTransform:"uppercase",marginBottom:8},
      btn:    (on,ac="#5a9a5a")=>({background:on?ac+"28":C.bg1,border:`1px solid ${on?ac:C.border}`,color:on?ac:C.dim,borderRadius:7,padding:"8px 12px",cursor:"pointer",fontSize:12,fontFamily:"'Courier New',monospace",transition:"all 0.15s"}),
      pBtn:   (on,col)=>({flex:1,padding:"10px 4px",textAlign:"center",background:on?col+"22":C.bg1,border:`2px solid ${on?col:C.border}`,color:on?col:C.mute,borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"'Courier New',monospace",transition:"all 0.15s"}),
      navBtn: (on)=>({flex:1,padding:"10px 4px",background:"transparent",border:"none",borderTop:`2px solid ${on?"#5a9a5a":"transparent"}`,color:on?"#8ad08a":C.mute,cursor:"pointer",fontSize:10,fontFamily:"'Courier New',monospace"}),
      subTab: (on)=>({background:on?"#1e3a1e":"transparent",border:`1px solid ${on?"#3a6a3a":C.border}`,color:on?"#a0d0a0":C.dim,borderRadius:7,padding:"7px 16px",cursor:"pointer",fontSize:11,fontFamily:"'Courier New',monospace"}),
      input:  {background:"#080f08",border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:13,fontFamily:"'Courier New',monospace",width:"100%"},
      pChip:  (on,col)=>({background:on?col+"22":"transparent",border:`1px solid ${on?col:C.border}`,color:on?col:C.mute,borderRadius:20,padding:"5px 14px",cursor:"pointer",fontSize:11,fontFamily:"'Courier New',monospace",transition:"all 0.15s"}),
    };

    // ── Stepper ──────────────────────────────────────────────────────
    function Stepper({label,value,min=0,max=8,onChange,hint,color="#f5c842"}) {
      return (
        <div>
          <div style={{...s.sec,marginBottom:6}}>{label}: <strong style={{color}}>{value}</strong>
            {hint&&<span style={{marginLeft:6,fontSize:9,color:C.dim}}>{hint}</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button style={{...s.btn(false),padding:"7px 16px",fontSize:16}} onClick={()=>onChange(Math.max(min,value-1))}>−</button>
            <div style={{flex:1,textAlign:"center",fontSize:22,color,fontWeight:"bold"}}>{value}</div>
            <button style={{...s.btn(false),padding:"7px 16px",fontSize:16}} onClick={()=>onChange(Math.min(max,value+1))}>+</button>
          </div>
        </div>
      );
    }

    // ── ErgebnisBlock ────────────────────────────────────────────────
    function ErgebnisBlock({form,upd}) {
      return (
        <div style={s.card()}>
          <div style={s.sec}>Ergebnis</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button style={{...s.btn(form.gewonnen,"#7de87a"),flex:1,fontSize:14,padding:10}} onClick={()=>upd("gewonnen",true)}>✓ Gewonnen</button>
            <button style={{...s.btn(!form.gewonnen,"#e85d4a"),flex:1,fontSize:14,padding:10}} onClick={()=>upd("gewonnen",false)}>✗ Verloren</button>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button style={{...s.btn(form.schneider,"#f5c842"),flex:1}} onClick={()=>{upd("schneider",!form.schneider);if(form.schneider)upd("schwarz",false);}}>
              Schneider {form.schneider?"✓":""}
            </button>
            <button style={{...s.btn(form.schwarz&&form.schneider,"#f5c842"),flex:1,opacity:form.schneider?1:0.35}} onClick={()=>{if(form.schneider)upd("schwarz",!form.schwarz);}}>
              Schwarz {form.schwarz?"✓":""}
            </button>
          </div>
          <Stepper label="Laufende" value={form.laufende} max={8} onChange={v=>upd("laufende",v)}
            hint={form.laufende>=3?`→ +${form.laufende-2} × S&L`:"Zählt ab 3"}/>
        </div>
      );
    }

    // ── Tooltips ─────────────────────────────────────────────────────
    function TooltipKonto({active,payload,label,rounds,startkapital}) {
      if (!active||!payload?.length) return null;
      const sorted=[...payload].sort((a,b)=>b.value-a.value);
      const r=label>0?rounds[label-1]:null;
      return (
        <div style={{background:"#0a1a0a",border:"1px solid #2a4a2a",borderRadius:8,padding:"10px 14px",fontSize:12}}>
          <div style={{color:"#7aaa7a",fontWeight:"bold",marginBottom:4}}>Runde {label}</div>
          {r&&<div style={{fontSize:10,color:TYPE_CATS[r.typeCat]?.color||"#888",marginBottom:6}}>
            {r.typeLabel}{r.solist?` · ${r.solist}`:r.spieler?` · ${r.spieler}`:""}
          </div>}
          {sorted.map(p=>{
            const diff=p.value-startkapital;
            return <div key={p.name} style={{color:p.color,marginBottom:2}}>
              {p.name}: <strong>{p.value.toLocaleString("de-DE")}</strong>
              <span style={{fontSize:10,marginLeft:6,color:diff>=0?"#7de87a":"#e85d4a"}}>{diff>=0?"+":""}{diff}</span>
            </div>;
          })}
        </div>
      );
    }

    function TooltipDelta({active,payload,label,rounds}) {
      if (!active||!payload?.length) return null;
      const r=rounds[Number(label)-1];
      if (!r) return null;
      const sorted=[...payload].filter(p=>p.value!==null).sort((a,b)=>b.value-a.value);
      return (
        <div style={{background:"#0a1a0a",border:"1px solid #2a4a2a",borderRadius:8,padding:"10px 14px",fontSize:12}}>
          <div style={{color:"#7aaa7a",fontWeight:"bold",marginBottom:4}}>Runde {label}</div>
          <div style={{fontSize:10,color:TYPE_CATS[r.typeCat]?.color||"#888",marginBottom:6}}>
            {r.typeLabel}{r.solist?` · ${r.solist}`:r.spieler?` · ${r.spieler}`:""}
            {r.typeCat!=="ramsch"&&(r.gewonnen?" · ✓":" · ✗")}
          </div>
          {sorted.map(p=><div key={p.name} style={{color:p.fill,marginBottom:2}}>
            {p.name}: <span style={{color:p.value>0?"#7de87a":p.value<0?"#e85d4a":"#3a5a3a",fontWeight:"bold"}}>
              {p.value>0?"+":""}{p.value}
            </span>
          </div>)}
        </div>
      );
    }

    // ── ChartTab ─────────────────────────────────────────────────────
    function ChartTab({rounds,players,startkapital}) {
      const [subTab,setSubTab]=useState("konto");
      const [hidden,setHidden]=useState(new Set());
      const toggleP=p=>setHidden(prev=>{const s=new Set(prev);s.has(p)?s.delete(p):s.add(p);return s;});

      const kontoData=useMemo(()=>{
        const rows=[{round:0,...Object.fromEntries(players.map(p=>[p,startkapital]))}];
        const cur=Object.fromEntries(players.map(p=>[p,startkapital]));
        rounds.forEach((r,i)=>{players.forEach(p=>cur[p]+=(r.deltas[p]||0));rows.push({round:i+1,...cur});});
        return rows;
      },[rounds,players,startkapital]);

      const deltaData=useMemo(()=>{
        const raw=rounds.map((r,i)=>({round:i+1,...Object.fromEntries(players.map(p=>[p,r.deltas[p]||0]))}));
        const out=[];
        raw.forEach((d,i)=>{
          out.push({...d,isReal:true});
          if(i<raw.length-1) out.push({round:`${d.round}.`,isReal:false,...Object.fromEntries(players.map(p=>[p,null]))});
        });
        return out;
      },[rounds,players]);

      const stats=useMemo(()=>{
        const st=Object.fromEntries(players.map(p=>[p,{angesagt:0,partner:0,gewonnen:0,verloren:0,total:0,byType:{}}]));
        rounds.forEach(r=>{
          players.forEach(p=>{const d=r.deltas[p]||0;st[p].total+=d;if(d>0)st[p].gewonnen++;if(d<0)st[p].verloren++;});
          if(r.spieler){st[r.spieler].angesagt++;st[r.spieler].byType[r.typeId]=(st[r.spieler].byType[r.typeId]||0)+1;}
          if(r.solist){st[r.solist].angesagt++;st[r.solist].byType[r.typeId]=(st[r.solist].byType[r.typeId]||0)+1;}
          if(r.partner)st[r.partner].partner++;
        });
        return st;
      },[rounds,players]);

      const sessionTypes=useMemo(()=>{
        const tc={};rounds.forEach(r=>tc[r.typeId]=(tc[r.typeId]||0)+1);
        return Object.entries(tc).sort((a,b)=>b[1]-a[1]);
      },[rounds]);

      const last=kontoData[kontoData.length-1]||{};
      const standings=players.map((p,i)=>({name:p,color:PCOLORS[i],value:last[p]||startkapital,diff:(last[p]||startkapital)-startkapital})).sort((a,b)=>b.value-a.value);

      if(rounds.length===0) return <div style={{textAlign:"center",color:C.mute,padding:40}}>Noch keine Runden eingetragen.</div>;

      return <>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <button style={s.subTab(subTab==="konto")} onClick={()=>setSubTab("konto")}>Kontostand</button>
          <button style={s.subTab(subTab==="delta")} onClick={()=>setSubTab("delta")}>Δ Delta</button>
        </div>

        {subTab==="konto"&&<>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
            {players.map((p,i)=><button key={p} onClick={()=>toggleP(p)} style={s.pChip(!hidden.has(p),PCOLORS[i])}>— {p}</button>)}
          </div>
          <ResponsiveContainer width="100%" height={260}>
            <LineChart data={kontoData} margin={{top:10,right:12,left:0,bottom:14}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e3a1e"/>
              <XAxis dataKey="round" stroke="#3a6a3a" tick={{fill:"#5a8a5a",fontSize:10}} label={{value:"Runde",position:"insideBottom",offset:-8,fill:C.dim,fontSize:10}}/>
              <YAxis stroke="#3a6a3a" tick={{fill:"#5a8a5a",fontSize:10}} tickFormatter={v=>v.toLocaleString("de-DE")} width={54}/>
              <Tooltip content={<TooltipKonto rounds={rounds} startkapital={startkapital}/>}/>
              <ReferenceLine y={startkapital} stroke="#2a4a2a" strokeDasharray="4 3" label={{value:"Start",position:"right",fill:C.mute,fontSize:9}}/>
              {players.map((p,i)=>!hidden.has(p)&&<Line key={p} type="monotone" dataKey={p} stroke={PCOLORS[i]} strokeWidth={2} dot={{r:3,fill:PCOLORS[i],strokeWidth:0}} activeDot={{r:5}} animationDuration={400}/>)}
            </LineChart>
          </ResponsiveContainer>
        </>}

        {subTab==="delta"&&<>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
            {players.map((p,i)=><div key={p} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:PCOLORS[i]}}>
              <div style={{width:10,height:10,background:PCOLORS[i],borderRadius:2}}/>{p}
            </div>)}
          </div>
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={deltaData} margin={{top:10,right:10,left:0,bottom:14}} barSize={8} barGap={2} barCategoryGap="20%">
              <CartesianGrid strokeDasharray="3 3" stroke="#1e3a1e"/>
              <XAxis dataKey="round" stroke="#3a6a3a"
                tick={({x,y,payload})=>!String(payload.value).includes(".")?<text x={x} y={y+10} textAnchor="middle" fill="#5a8a5a" fontSize={10}>{payload.value}</text>:null}
                label={{value:"Runde",position:"insideBottom",offset:-8,fill:C.dim,fontSize:10}}/>
              <YAxis stroke="#3a6a3a" tick={{fill:"#5a8a5a",fontSize:10}} width={40}/>
              <Tooltip content={<TooltipDelta rounds={rounds}/>}/>
              <ReferenceLine y={0} stroke="#3a6a3a" strokeWidth={1}/>
              {players.map((p,i)=><Bar key={p} dataKey={p} fill={PCOLORS[i]} opacity={0.85} radius={[2,2,0,0]} animationDuration={400}/>)}
            </BarChart>
          </ResponsiveContainer>
        </>}

        <div style={{marginTop:20}}>
          <div style={{...s.sec,fontSize:10,letterSpacing:3,marginBottom:12}}>STATISTIK</div>
          <div style={s.card()}>
            <div style={s.sec}>Meistgespielte Spielarten</div>
            {sessionTypes.map(([tid,cnt])=>{
              const t=GAME_TYPES.find(g=>g.id===tid);
              const col=TYPE_CATS[t?.cat||"2vs2"]?.color||"#888";
              const pct=Math.round(cnt/rounds.length*100);
              return <div key={tid} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                  <span style={{color:col}}>{t?.label||tid}</span>
                  <span style={{color:C.dim}}>{cnt}× · {pct}%</span>
                </div>
                <div style={{height:5,background:C.border,borderRadius:3}}>
                  <div style={{height:"100%",width:`${pct}%`,background:col+"99",borderRadius:3}}/>
                </div>
              </div>;
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {standings.map((p,i)=>{
              const st=stats[p.name];
              const total=st.gewonnen+st.verloren;
              const rate=total>0?Math.round(st.gewonnen/total*100):0;
              const topTypes=Object.entries(st.byType).sort((a,b)=>b[1]-a[1]);
              return <div key={p.name} style={s.card(p.color+"44",p.color+"0d")}>
                <div style={{fontSize:13,fontWeight:"bold",color:p.color,marginBottom:6}}>{p.name}</div>
                <div style={{fontSize:17,fontWeight:"bold",color:"#e8ead0",marginBottom:4}}>
                  {p.value.toLocaleString("de-DE")}
                  <span style={{fontSize:11,marginLeft:6,color:p.diff>=0?"#7de87a":"#e85d4a"}}>{p.diff>=0?"+":""}{p.diff}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:10}}>
                  {[["Gespielt",st.angesagt,p.color],["Partner",st.partner,"#6a9a6a"],["Siege",st.gewonnen,"#7de87a"],["Siegrate",rate+"%",rate>=50?"#7de87a":"#e85d4a"]].map(([lbl,val,col])=><div key={lbl} style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 4px",textAlign:"center"}}>
                    <div style={{fontSize:8,color:C.dim,marginBottom:1}}>{lbl}</div>
                    <div style={{fontSize:14,fontWeight:"bold",color:col}}>{val}</div>
                  </div>)}
                </div>
                {topTypes.length>0&&<>
                  <div style={{...s.sec,marginBottom:5}}>Meist angesagt</div>
                  {topTypes.slice(0,3).map(([tid,cnt],rank)=>{
                    const t=GAME_TYPES.find(g=>g.id===tid);
                    const col=TYPE_CATS[t?.cat||"2vs2"]?.color||"#888";
                    const pct=st.angesagt>0?Math.round(cnt/st.angesagt*100):0;
                    return <div key={tid} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                      <div style={{fontSize:9,color:C.mute,width:12}}>#{rank+1}</div>
                      <div style={{fontSize:10,color:col,width:56}}>{t?.label||tid}</div>
                      <div style={{flex:1,height:4,background:C.border,borderRadius:2}}>
                        <div style={{height:"100%",width:`${pct}%`,background:col+"88",borderRadius:2}}/>
                      </div>
                      <div style={{fontSize:9,color:C.dim,width:20,textAlign:"right"}}>{cnt}×</div>
                    </div>;
                  })}
                </>}
              </div>;
            })}
          </div>
        </div>
      </>;
    }

    // ── Hauptkomponente ──────────────────────────────────────────────
    function emptyForm() {
      return {spieler:null,partner:null,solist:null,verlierer:null,gewonnen:true,schneider:false,schwarz:false,laufende:0,jungfrauen:0,sticht:0,pflichtramsch:false,durchmarsch:false,mitFarbe:false,tout:false};
    }

    function SchafkopfTracker() {
      const getSaved = () => { try{const s=localStorage.getItem(LS_KEY);if(s)return JSON.parse(s);}catch{}return null; };
      const sv = getSaved();

      const [nav,setNav]            = useState("home");
      const [players,setPlayers]    = useState(sv?.players      || ["Fabi","Daniel","Tim","Nils"]);
      const [tariff,setTariff]      = useState(sv?.tariff       || {sl:25,sauspiel:25,solo:50});
      const [startkapital,setStart] = useState(sv?.startkapital || 1100);
      const [rounds,setRounds]      = useState(sv?.rounds       || []);
      const [selType,setSelType]    = useState(null);
      const [form,setForm]          = useState(emptyForm());

      useEffect(()=>{
        try{localStorage.setItem(LS_KEY,JSON.stringify({players,tariff,startkapital,rounds}));}catch{}
      },[players,tariff,startkapital,rounds]);

      const upd  = (k,v) => setForm(f=>({...f,[k]:v}));
      const updT = (k,v) => setTariff(t=>({...t,[k]:v}));

      const konten = useMemo(()=>{
        const k=Object.fromEntries(players.map(p=>[p,startkapital]));
        rounds.forEach(r=>players.forEach(p=>k[p]+=(r.deltas[p]||0)));
        return k;
      },[rounds,players,startkapital]);

      const typeCfg = selType ? GAME_TYPES.find(t=>t.id===selType) : null;

      const preview = useMemo(()=>{
        if(!typeCfg) return null;
        const b=calcBetrag(form,typeCfg,tariff);
        return calcDeltas(form,players,b,typeCfg);
      },[form,players,tariff,typeCfg]);

      function eintragen() {
        if(!preview) return;
        const b=calcBetrag(form,typeCfg,tariff);
        setRounds(r=>[...r,{id:Date.now(),runde:r.length+1,typeId:selType,typeLabel:typeCfg.label,typeCat:typeCfg.cat,...form,betrag:b,deltas:preview}]);
        setForm(emptyForm()); setSelType(null); setNav("home");
      }

      function exportJSON() {
        const blob=new Blob([JSON.stringify({players,tariff,startkapital,rounds},null,2)],{type:"application/json"});
        const a=document.createElement("a");a.href=URL.createObjectURL(blob);
        a.download=`schafkopf-${new Date().toISOString().slice(0,10)}.json`;a.click();
      }

      function importJSON(e) {
        const file=e.target.files[0];if(!file)return;
        const r=new FileReader();
        r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.players)setPlayers(d.players);if(d.tariff)setTariff(d.tariff);if(d.startkapital)setStart(d.startkapital);if(d.rounds)setRounds(d.rounds);}catch{}};
        r.readAsText(file);
      }

      const standings=players.map((p,i)=>({name:p,color:PCOLORS[i],value:konten[p],diff:konten[p]-startkapital})).sort((a,b)=>b.value-a.value);

      return (
        <div style={s.page}>
          <div style={s.topbar}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:9,color:C.mute,letterSpacing:3}}>SCHAFKOPF</div>
                <div style={{fontSize:15,fontWeight:"bold",color:"#e8ead0"}}>
                  {nav==="home"&&"Spieltyp wählen"}
                  {nav==="entry"&&(typeCfg?.label||"Eintragen")}
                  {nav==="verlauf"&&`Verlauf (${rounds.length})`}
                  {nav==="chart"&&"Chart & Statistik"}
                  {nav==="settings"&&"Einstellungen"}
                </div>
              </div>
              <div style={{textAlign:"right",fontSize:10,color:C.mute}}>
                <div>Runde {rounds.length}</div>
                <div>S&L {tariff.sl} · Ssp {tariff.sauspiel} · Solo {tariff.solo}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginTop:8}}>
              {standings.map((p,i)=><div key={p.name} style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:p.color}}>{p.name}</div>
                <div style={{fontSize:14,fontWeight:"bold",color:"#e8ead0"}}>{p.value.toLocaleString("de-DE")}</div>
                <div style={{fontSize:10,color:p.diff>=0?"#7de87a":"#e85d4a"}}>{p.diff>=0?"+":""}{p.diff}</div>
              </div>)}
            </div>
          </div>

          <div style={{padding:"14px 16px"}}>

            {nav==="home"&&<>
              <div style={{...s.card(),marginBottom:16}}>
                <div style={s.sec}>Aktueller Tarif</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,fontSize:12}}>
                  {[["Schneider & Lfd.","sl","#f5c842"],["Sauspiel","sauspiel","#4ab8e8"],["Solo","solo","#f5c842"]].map(([label,key,col])=><div key={key}>
                    <div style={{fontSize:9,color:C.dim,marginBottom:2}}>{label}</div>
                    <div style={{color:col,fontWeight:"bold"}}>{tariff[key]} Chips</div>
                  </div>)}
                </div>
              </div>
              {Object.entries(TYPE_CATS).map(([cat,catInfo])=><div key={cat} style={{marginBottom:16}}>
                <div style={{...s.sec,color:catInfo.color+"99"}}>{catInfo.label}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {GAME_TYPES.filter(t=>t.cat===cat).map(t=><div key={t.id}
                    onClick={()=>{setSelType(t.id);setForm(emptyForm());setNav("entry");}}
                    style={{background:catInfo.color+"0e",border:`1px solid ${catInfo.color}33`,borderRadius:10,padding:"12px",cursor:"pointer"}}>
                    <div style={{fontSize:15,fontWeight:"bold",color:catInfo.color,marginBottom:2}}>{t.label}</div>
                    <div style={{fontSize:10,color:C.dim,marginBottom:6}}>{t.desc}</div>
                    <div style={{fontSize:12,color:"#a0c0a0"}}>ab <strong style={{color:catInfo.color}}>{t.cat==="2vs2"?tariff.sauspiel:tariff.solo} Chips</strong></div>
                  </div>)}
                </div>
              </div>)}
              {rounds.length>0&&<button onClick={()=>setRounds(r=>r.slice(0,-1))} style={{...s.btn(false,"#9a5a5a"),width:"100%",padding:10,marginTop:4}}>↩ Letzte Runde rückgängig</button>}
            </>}

            {nav==="entry"&&typeCfg&&(()=>{
              const catColor=TYPE_CATS[typeCfg.cat]?.color||"#fff";
              return <>
                <div style={s.card(catColor+"44",catColor+"0e")}>
                  <div style={{fontSize:11,color:catColor}}>{typeCfg.desc}</div>
                  <div style={{fontSize:12,color:"#8ab0aa",marginTop:4}}>
                    {typeCfg.cat==="2vs2"?`Basis: ${tariff.sauspiel} + Modif. à ${tariff.sl} Chips`:typeCfg.cat==="ramsch"?`Basis: ${tariff.sauspiel} + Jungfrauen-Verdoppelung`:`Basis: ${tariff.solo} + Modif. à ${tariff.sl} Chips`}
                  </div>
                </div>

                {typeCfg.cat==="2vs2"&&<div style={s.card()}>
                  <div style={s.sec}>Spieler</div>
                  <div style={{display:"flex",gap:6,marginBottom:12}}>
                    {players.map((p,i)=><button key={p} style={s.pBtn(form.spieler===p,PCOLORS[i])} onClick={()=>{upd("spieler",form.spieler===p?null:p);if(form.partner===p)upd("partner",null);}}>{p}</button>)}
                  </div>
                  <div style={s.sec}>Partner</div>
                  <div style={{display:"flex",gap:6}}>
                    {players.filter(p=>p!==form.spieler).map(p=>{const ci=players.indexOf(p);return <button key={p} style={s.pBtn(form.partner===p,PCOLORS[ci])} onClick={()=>upd("partner",form.partner===p?null:p)}>{p}</button>;})}
                  </div>
                </div>}

                {typeCfg.cat==="solo"&&<div style={s.card()}>
                  <div style={s.sec}>Solist</div>
                  <div style={{display:"flex",gap:6,marginBottom:(typeCfg.hasFarbe||typeCfg.isSolo)?12:0}}>
                    {players.map((p,i)=><button key={p} style={s.pBtn(form.solist===p,PCOLORS[i])} onClick={()=>upd("solist",form.solist===p?null:p)}>{p}</button>)}
                  </div>
                  {(typeCfg.hasFarbe||typeCfg.isSolo)&&<div style={{display:"flex",gap:8}}>
                    {typeCfg.hasFarbe&&<button style={{...s.btn(form.mitFarbe,"#a080e0"),flex:1}} onClick={()=>upd("mitFarbe",!form.mitFarbe)}>Mit Farbe {form.mitFarbe?"✓":""}</button>}
                    {typeCfg.isSolo&&<button style={{...s.btn(form.tout,"#ff8c42"),flex:1}} onClick={()=>upd("tout",!form.tout)}>Tout (×2) {form.tout?"✓":""}</button>}
                  </div>}
                </div>}

                {typeCfg.cat==="ramsch"&&<div style={s.card()}>
                  <div style={s.sec}>Verlierer (meiste Augen)</div>
                  <div style={{display:"flex",gap:6,marginBottom:16}}>
                    {players.map((p,i)=><button key={p} style={s.pBtn(form.verlierer===p,PCOLORS[i])} onClick={()=>upd("verlierer",form.verlierer===p?null:p)}>{p}</button>)}
                  </div>
                  <div style={{marginBottom:14}}>
                    <Stepper label="Jungfrauen" value={form.jungfrauen} max={3} onChange={v=>upd("jungfrauen",v)} color="#e85d4a"
                      hint={form.jungfrauen>0?`Faktor ×${Math.pow(2,form.jungfrauen)}`:undefined}/>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button style={{...s.btn(form.durchmarsch,"#7de87a"),flex:1}} onClick={()=>upd("durchmarsch",!form.durchmarsch)}>Durchmarsch {form.durchmarsch?"✓":""}</button>
                    <button style={{...s.btn(form.pflichtramsch,"#a080e0"),flex:1}} onClick={()=>upd("pflichtramsch",!form.pflichtramsch)}>Pflichtramsch {form.pflichtramsch?"✓":""}</button>
                  </div>
                </div>}

                {typeCfg.cat!=="ramsch"&&<ErgebnisBlock form={form} upd={upd}/>}

                <div style={s.card()}>
                  <div style={s.sec}>Sticht (Kontra / Re)</div>
                  <Stepper label={["–","Sticht","Re-Sticht","×8","×16"][form.sticht]||`×${Math.pow(2,form.sticht)}`}
                    value={form.sticht} max={4} onChange={v=>upd("sticht",v)} color="#d080e0"
                    hint={form.sticht>0?`Faktor ×${Math.pow(2,form.sticht)}`:undefined}/>
                </div>

                {preview&&(()=>{
                  const b=calcBetrag(form,typeCfg,tariff);
                  const sm=Math.pow(2,form.sticht||0);
                  const jm=typeCfg.cat==="ramsch"?Math.pow(2,form.jungfrauen||0):1;
                  return <div style={{background:"#0a1a0a",border:"1px solid #2a5a2a",borderRadius:10,padding:"12px 14px",marginBottom:10}}>
                    <div style={{...s.sec,color:"#3a8a3a"}}>
                      Vorschau · {b}{sm>1?` × ${sm}`:""}{jm>1?` × ${jm}`:""} = <strong style={{color:"#7de87a"}}>{b*sm*jm} Chips</strong>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                      {players.map((p,i)=>{
                        const delta=preview[p];
                        return <div key={p} style={{textAlign:"center"}}>
                          <div style={{fontSize:9,color:PCOLORS[i]}}>{p}</div>
                          <div style={{fontSize:20,fontWeight:"bold",color:delta>0?"#7de87a":delta<0?"#e85d4a":"#2a4a2a"}}>{delta>0?"+":""}{delta}</div>
                          <div style={{fontSize:10,color:"#2a5a2a"}}>{konten[p]+delta}</div>
                        </div>;
                      })}
                    </div>
                  </div>;
                })()}

                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setNav("home");setSelType(null);}} style={{...s.btn(false,"#5a5a8a"),padding:"12px 16px"}}>← Zurück</button>
                  <button onClick={eintragen} disabled={!preview}
                    style={{flex:1,padding:14,fontFamily:"'Courier New',monospace",fontWeight:"bold",fontSize:14,
                      background:preview?"#1a4a1a":C.bg1,border:`1px solid ${preview?"#4a9a4a":C.border}`,
                      color:preview?"#7de87a":"#2a4a2a",borderRadius:8,cursor:preview?"pointer":"default"}}>
                    ✓ Runde {rounds.length+1} eintragen
                  </button>
                </div>
              </>;
            })()}

            {nav==="verlauf"&&(rounds.length===0
              ?<div style={{textAlign:"center",color:C.mute,padding:40}}>Noch keine Runden.</div>
              :[...rounds].reverse().map(r=>{
                const sm=Math.pow(2,r.sticht||0);
                const jm=r.jungfrauen>0?Math.pow(2,r.jungfrauen):1;
                const catColor=TYPE_CATS[r.typeCat]?.color||"#fff";
                return <div key={r.id} style={s.card()}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}}>
                    <span style={{fontSize:11,color:C.dim}}>Runde {r.runde}</span>
                    <span style={{fontSize:11,color:catColor}}>
                      {r.typeLabel}
                      {r.mitFarbe&&<span style={{color:"#a080e0"}}> Farbe</span>}
                      {r.tout&&<span style={{color:"#ff8c42"}}> Tout</span>}
                      {r.typeCat!=="ramsch"&&(r.gewonnen?" · ✓":" · ✗")}
                      {r.schneider?" · Schndr.":""}
                      {r.schwarz?" · Schwz.":""}
                      {r.laufende>=3?` · ${r.laufende} Lfd.`:""}
                      {r.sticht>0&&<span style={{color:"#d080e0"}}> · Sticht ×{sm}</span>}
                      {r.typeCat==="ramsch"&&r.jungfrauen>0?` · ${r.jungfrauen} Jungfr.`:""}
                      {r.pflichtramsch?" · Pflicht":""}
                      {r.durchmarsch?" · Durchm.":""}
                    </span>
                  </div>
                  <div style={{fontSize:10,color:C.mute,marginBottom:6}}>Betrag: <strong style={{color:"#f5c842"}}>{r.betrag*sm*jm} Chips</strong></div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                    {players.map((p,i)=>{const d=r.deltas[p]||0;return <div key={p} style={{textAlign:"center"}}>
                      <div style={{fontSize:9,color:PCOLORS[i]}}>{p}</div>
                      <div style={{fontSize:16,fontWeight:"bold",color:d>0?"#7de87a":d<0?"#e85d4a":"#2a4a2a"}}>{d>0?"+":""}{d}</div>
                    </div>;})}
                  </div>
                </div>;
              })
            )}

            {nav==="chart"&&<ChartTab rounds={rounds} players={players} startkapital={startkapital}/>}

            {nav==="settings"&&<>
              <div style={s.card()}>
                <div style={s.sec}>Spielernamen</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {players.map((p,i)=><div key={i}>
                    <div style={{fontSize:9,color:PCOLORS[i],marginBottom:4}}>Spieler {i+1}</div>
                    <input style={{...s.input,borderColor:PCOLORS[i]+"55"}} value={p} onChange={e=>setPlayers(pl=>pl.map((n,j)=>j===i?e.target.value:n))}/>
                  </div>)}
                </div>
              </div>
              <div style={s.card()}>
                <div style={s.sec}>Tarif</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                  {[["Schneider & Lfd.","sl"],["Sauspiel","sauspiel"],["Solo","solo"]].map(([label,key])=><div key={key}>
                    <div style={{fontSize:9,color:C.dim,marginBottom:4}}>{label}</div>
                    <input style={s.input} type="number" value={tariff[key]} onChange={e=>updT(key,Number(e.target.value))}/>
                  </div>)}
                </div>
                <div style={{fontSize:9,color:C.mute,marginTop:10,display:"flex",alignItems:"center",gap:8}}>
                  Standard: S&L 25 · Sauspiel 25 · Solo 50
                  <button onClick={()=>setTariff({sl:25,sauspiel:25,solo:50})} style={{...s.btn(false),padding:"3px 8px",fontSize:9}}>Reset</button>
                </div>
              </div>
              <div style={s.card()}>
                <div style={s.sec}>Startkapital</div>
                <input style={s.input} type="number" value={startkapital} onChange={e=>setStart(Number(e.target.value))}/>
              </div>
              <div style={s.card()}>
                <div style={s.sec}>Daten</div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <button onClick={exportJSON} style={{...s.btn(false,"#7de87a"),flex:1,padding:10}}>↓ Export ({rounds.length} Runden)</button>
                  <label style={{...s.btn(false,"#4ab8e8"),flex:1,padding:10,textAlign:"center",cursor:"pointer"}}>
                    ↑ Import<input type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/>
                  </label>
                </div>
                {rounds.length>0&&<button onClick={()=>{if(window.confirm("Alle Runden löschen?"))setRounds([]);}} style={{...s.btn(false,"#e85d4a"),width:"100%",padding:8}}>🗑 Alle löschen</button>}
              </div>
            </>}

          </div>

          <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#080f08",borderTop:`1px solid ${C.border}`,display:"flex"}}>
            {[["home","🂡","Spiel"],["verlauf",`📋 ${rounds.length}`,"Verlauf"],["chart","📊","Chart"],["settings","⚙","Einst."]].map(([key,icon,label])=><button key={key} style={s.navBtn(nav===key||(nav==="entry"&&key==="home"))} onClick={()=>{setNav(key);if(key!=="entry")setSelType(null);}}>
              <div style={{fontSize:16}}>{icon}</div>
              <div>{label}</div>
            </button>)}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<SchafkopfTracker/>);
  </script>
</body>
</html>
